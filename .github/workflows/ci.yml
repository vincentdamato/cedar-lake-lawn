name: CI (build + test)

# Validates work-in-progress WITHOUT deploying. Only the deploy.yml workflow
# (push to main) publishes to the live site.
on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
